{% set name = "qstylizer" %}
{% set version = "0.2.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/blambright/{{ name }}/archive/refs/tags/{{ version }}.tar.gz
  sha256: 5ad15eeafdb140af3711531a1468382e3a15d8a416e5b1bcc6bf28693a7c37ee

build:
  noarch: python
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - pbr
    - setuptools
  run:
    - python >={{ python_min }}
    - tinycss2 >=1.1.0,<2.0
    - inflection >0.3.0,<1.0


test:
  imports:
    - qstylizer
    - qstylizer.style

about:
  home: https://github.com/blambright/qstylizer
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: 'Qt stylesheet generation utility for PyQt/PySide '
  description: |
    qstylizer is a python package designed to help with the construction of
    PyQt/PySide stylesheets.
  doc_url: http://qstylizer.readthedocs.io
  dev_url: https://github.com/blambright/qstylizer

extra:
  recipe-maintainers:
    - andfoy
    - ccordoba12
    - steff456
